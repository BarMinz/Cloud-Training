# Extract username from *.cloud-training.online subdomains
map $host $lab_username {
    ~^(?<u>[^.]+)\.cloud-training\.online$ $u;
    default                                 "";
}

# Map username → container internal IP (managed by containers.py)
map $lab_username $lab_upstream {
    include /etc/nginx/lab-upstreams.map;
    default "";
}

server {
    listen 79.108.163.9:80;
    server_name ~^[^.]+\.cloud-training\.online$;

    resolver 127.0.0.1 valid=10s;

    location / {
        if ($lab_upstream = "") {
            return 503 "Lab container is not running.";
        }

        proxy_pass          http://$lab_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
