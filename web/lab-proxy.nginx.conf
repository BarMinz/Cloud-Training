# Extract username from *.cloud-training.online subdomains
map $host $lab_username {
    ~^(?<u>[^.]+)\.cloud-training\.online$ $u;
    default                                 "";
}

# Map username → container internal IP (managed by containers.py)
map $lab_username $lab_upstream {
    include /etc/nginx/lab-upstreams.map;
    default "";
}

# Redirect HTTP subdomains to HTTPS
server {
    listen 79.108.163.7:80;
    server_name ~^[^.]+\.cloud-training\.online$;
    return 301 https://$host$request_uri;
}

# HTTPS proxy for lab subdomains
server {
    listen 79.108.163.7:443 ssl;
    server_name ~^[^.]+\.cloud-training\.online$;

    ssl_certificate     /etc/letsencrypt/live/cloud-training.online-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud-training.online-0001/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:LABSSL:10m;
    ssl_session_timeout 1d;

    resolver 127.0.0.1 valid=10s;

    location / {
        if ($lab_upstream = "") {
            return 503 "Lab container is not running.";
        }

        proxy_pass          http://$lab_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
